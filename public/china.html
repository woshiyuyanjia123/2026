<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>China Supplier Network</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="china" data-default-lang="zh">
    <div class="shell">
      <header id="site-header"></header>
      <main class="page">
        <section class="hero">
          <div class="hero-copy">
            <p id="hero-kicker" class="kicker"></p>
            <h1 id="hero-title"></h1>
            <p id="hero-text" class="hero-text"></p>
            <div id="flow-steps" class="flow-steps"></div>
          </div>
          <aside class="hero-aside">
            <div id="stats-grid" class="stats-grid"></div>
          </aside>
        </section>

        <section class="content-grid">
          <section class="panel">
            <div class="panel-head">
              <div>
                <p id="participant-list-kicker" class="kicker"></p>
                <h2 id="participant-list-title"></h2>
              </div>
            </div>
            <form id="china-filters" class="filter-bar">
              <select id="china-sector" name="sector"></select>
              <select id="china-role" name="role"></select>
              <select id="china-market" name="market"></select>
            </form>
            <div id="participant-list" class="card-list"></div>
          </section>

          <aside class="panel detail-panel">
            <div class="panel-head">
              <div>
                <p id="participant-detail-kicker" class="kicker"></p>
                <h2 id="participant-detail-title"></h2>
              </div>
            </div>
            <div id="participant-detail"></div>
            <div class="subpanel">
              <div class="subpanel-head">
                <p id="role-fit-kicker" class="kicker"></p>
                <h3 id="role-fit-title"></h3>
              </div>
              <div id="role-fit-list" class="mini-list"></div>
            </div>
            <div class="subpanel">
              <div class="subpanel-head">
                <h3 id="shortlist-panel-title"></h3>
              </div>
              <form id="shortlist-form" class="mini-form">
                <textarea id="shortlist-note" rows="3"></textarea>
                <button id="shortlist-submit" class="primary-button" type="submit"></button>
                <p id="shortlist-feedback" class="feedback"></p>
              </form>
            </div>
          </aside>
        </section>

        <section class="content-grid">
          <section class="panel">
            <div class="panel-head">
              <div>
                <p id="company-profiles-kicker" class="kicker"></p>
                <h2 id="company-profiles-title"></h2>
              </div>
            </div>
            <div id="company-profile-grid" class="company-grid"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <div>
                <p id="visit-brief-kicker" class="kicker"></p>
                <h2 id="visit-brief-title"></h2>
              </div>
            </div>
            <div id="visit-brief-surface" class="signal-grid"></div>
          </section>
        </section>

        <section class="panel">
          <div id="langyan-surface"></div>
        </section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
